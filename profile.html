            <button type="button" class="recipe-btn" style="position: static; width: 100%;">Увійти</button>

        <p style="margin-top: 20px; font-size: 14px;"><a href="index.html" style="color: #8B5A2B; text-decoration: none;">← Назад на головну</a></p>
